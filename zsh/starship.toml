"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt for terminal-stack. Installs to ~/.config/starship.toml.
# Palette is Catppuccin Mocha (official catppuccin/starship mapping) to match
# Ghostty / Zellij / Neovim. Reference: zsh/README.md · https://starship.rs/config

add_newline = true
palette = "catppuccin_mocha"

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[directory]
style = "blue bold"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "mauve"

[git_status]
style = "red"

[cmd_duration]
min_time = 2000
style = "yellow"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# ── Catppuccin Mocha palette (catppuccin/starship) ────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
