"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt for terminal-stack. Installs to ~/.config/starship.toml.
# Colors are the terminal's 16 ANSI slots (no hardcoded palette) so the prompt
# follows Ghostty's live theme repaint — whatever palette, light or dark — with
# zero switching logic. Reference: zsh/README.md · https://starship.rs/config

add_newline = true

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[directory]
style = "blue bold"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "red"

[cmd_duration]
min_time = 2000
style = "yellow"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"
